
<!DOCTYPE html>
<html>
<head>
<title>Initializing System...</title>

<style>
body {
    margin:0;
    background:black;
    overflow:hidden;
}

/* Video */
video {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    transition:opacity 1s;
}

/* Background after video */
#bgEffect {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #001a0f, #000000);
    opacity:0;
    z-index:-1;
    transition:opacity 1s;
}

/* Scan lines */
#bgEffect::after {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,100,0.05),
        rgba(0,255,100,0.05) 2px,
        transparent 2px,
        transparent 4px
    );
}

/* Text */
#secureText {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    color:#00ff88;
    font-family: monospace;
    text-align:center;
}

/* Heading */
#line1 {
    font-size:36px;
    text-shadow:0 0 10px #00ff88, 0 0 30px #00ff88;
    margin-bottom:25px;
    animation: glowPulse 2s infinite;
}

/* Names */
.name {
    font-size:28px;
    opacity:0;
    margin:8px 0;
    text-shadow:0 0 8px #00ff88;
}

/* Glow animation */
@keyframes glowPulse {
    0% { text-shadow:0 0 10px #00ff88; }
    50% { text-shadow:0 0 25px #00ff88, 0 0 50px #00ff88; }
    100% { text-shadow:0 0 10px #00ff88; }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="intro" autoplay muted playsinline>
    <source src="video/Patil.mp4" type="video/mp4">
</video>

<!-- BACKGROUND EFFECT -->
<div id="bgEffect"></div>

<!-- TEXT -->
<div id="secureText">
    <div id="line1"></div>

    <div class="name" id="n1">Saurabh Vijay Ingle</div>
    <div class="name" id="n2">Sharad Jitendra Warade</div>
    <div class="name" id="n3">Gaurav Anil Pande</div>
    <div class="name" id="n4">Abhijit Ranjit Ingle</div>
</div>

<!-- SOUND -->
<audio id="typingSound" src="sounds/typing.mp3"></audio>

<script>
let video = document.getElementById("intro");
let bg = document.getElementById("bgEffect");
let typingAudio = document.getElementById("typingSound");

typingAudio.loop = true;

let text = "🚀 Initializing Secure Interface...";
let i = 0;

// typing
function typeText(){

    if(i === 0){
        typingAudio.currentTime = 2;
        typingAudio.play();
    }

    if(i < text.length){
        document.getElementById("line1").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 35);
    } else {
        typingAudio.pause();
        typingAudio.currentTime = 0;
    }
}

// names
function showNames(){
    let names = ["n1","n2","n3","n4"];
    names.forEach((id, index)=>{
        setTimeout(()=>{
            document.getElementById(id).style.opacity = 1;
        }, index * 500);
    });
}

// video end
video.onended = function(){

    // fade video
    video.style.opacity = 0;

    // show background
    bg.style.opacity = 1;

    typeText();
    setTimeout(showNames, 1400);

    setTimeout(()=>{
        window.location.href = "main.html";
    }, 5000);
};
</script>

</body>
</html>
